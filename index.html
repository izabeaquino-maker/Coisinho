<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Game - Niver do Coisinho</title>
    <!-- Fonte Pixel Art -->
    <link href="" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Press Start 2P', monospace;
        }

        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container do Jogo ajustado para manter a proporção das imagens */
        #game-container {
            width: 750px;
            height: 750px;
            position: relative;
            background-color: #000;
            border: 4px solid #fff;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.9);
            overflow: hidden;
        }

        /* Tela de Start */
        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #87CEEB;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border: 8px solid #4682B4;
        }

        #start-screen h1 {
            color: #1E3F66;
            font-size: 22px;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 3px 3px 0px #FFF;
            line-height: 1.5;
            padding: 0 20px;
        }

        .btn-play {
            background-color: #005f73;
            color: #FFF;
            border: 4px solid #FFF;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s;
        }

        .btn-play:hover {
            background-color: #0a9396;
            transform: scale(1.05);
        }

        /* Cenários com as Imagens */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Imagem da Padaria */
        #bakery-scene {
            background-image: url('padaria.jpg');
        }

        /* Imagem da Cozinha */
        #kitchen-scene {
            background-image: url('cozinha.jpg');
        }

        /* Zona invisível da porta de saída */
        .exit-door {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 120px;
            background-color: rgba(230, 57, 70, 0.8);
            border: 3px dashed #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 10px;
            text-align: center;
            cursor: pointer;
            z-index: 10;
        }

        /* Bacia e Mesa na Cozinha */
        .kitchen-table-area {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bowl {
            width: 90px;
            height: 55px;
            background-color: #ffffff;
            border: 4px solid #d8d8d8;
            border-radius: 0 0 45px 45px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4);
            z-index: 15;
            transition: transform 0.15s ease;
        }

        /* Avatares */
        .avatar {
            position: absolute;
            transition: all 0.3s ease;
            z-index: 20;
        }

        /* Avatar em Imagem Real do Coisinho */
        .coisinho-img {
            width: 110px;
            height: auto;
        }

        /* Seu Avatar (Estilo Pixel em CSS) */
        .my-avatar {
            width: 60px;
            height: 90px;
            background-color: #e63946;
            border-radius: 8px;
            border: 3px solid #900c3f;
        }
        .my-avatar::before {
            content: '';
            position: absolute;
            top: -24px;
            left: -4px;
            width: 62px;
            height: 30px;
            background-color: #d62828;
            border-radius: 18px 18px 0 0;
        }
        .my-avatar::after {
            content: '';
            position: absolute;
            top: 18px;
            left: 12px;
            width: 30px;
            height: 15px;
            background-color: #e0a96d;
            border-radius: 3px;
        }

        /* Itens para Coletar na Padaria */
        .item {
            width: 40px;
            height: 40px;
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
            border: 3px solid #000;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 15;
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        /* Caixas de Texto e Popups */
        #msg-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background-color: rgba(0, 0, 0, 0.88);
            color: #FFF;
            border: 3px solid #FFF;
            padding: 14px;
            font-size: 11px;
            line-height: 1.6;
            text-align: center;
            z-index: 50;
        }

        .achievement {
            position: absolute;
            bottom: -90px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #f1c40f;
            color: #000;
            border: 4px solid #000;
            padding: 14px 20px;
            font-size: 10px;
            text-align: center;
            z-index: 60;
            transition: bottom 0.5s ease-in-out;
            box-shadow: 0 4px 0 #b7950b;
            max-width: 85%;
        }

        .achievement.show {
            bottom: 25px;
        }

        /* Bolo de Aniversário */
        #cake {
            width: 70px;
            height: 50px;
            background-color: #fff;
            border: 3px solid #d4a373;
            border-radius: 8px 8px 0 0;
            position: absolute;
            top: -55px;
            left: 6px;
            display: none;
        }
        #cake::before {
            content: '';
            position: absolute;
            top: 0;
            width: 100%;
            height: 18px;
            background-color: #fcbf49;
            border-radius: 5px 5px 0 0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- TELA DE START -->
        <div id="start-screen">
            <h1>O ANIVERSÁRIO DO COISINHO</h1>
            <button class="btn-play" onclick="startGame()">PLAY</button>
        </div>

        <!-- CAIXA DE MENSAGENS -->
        <div id="msg-box">Carregando missão...</div>

        <!-- POPUP DE CONQUISTAS -->
        <div id="achievement-popup" class="achievement">
            🏆 <b>CONQUISTA DESBLOQUEADA:</b><br><span id="achievement-text"></span>
        </div>

        <!-- CENÁRIO 1: PADARIA -->
        <div id="bakery-scene" class="scene">
            <div class="exit-door" id="door" onclick="tryExit()">SAÍDA</div>
            
            <!-- Avatar do Coisinho (Imagem Real) -->
            <img src="coisinho.png" id="coisinho-bakery" class="avatar coisinho-img" style="bottom: 80px; left: 80px;" alt="Coisinho">

            <!-- Ingredientes espalhados pelas prateleiras/mesas -->
            <div class="item" id="item-leite" style="top: 280px; left: 240px;" onclick="collectItem('leite', '🥛 Leite')">🥛</div>
            <div class="item" id="item-trigo" style="top: 220px; left: 520px;" onclick="collectItem('trigo', '🌾 Trigo')">🌾</div>
            <div class="item" id="item-ovo" style="top: 480px; left: 160px;" onclick="collectItem('ovo', '🥚 Ovo')">🥚</div>
            <div class="item" id="item-manteiga" style="top: 460px; left: 580px;" onclick="collectItem('manteiga', '🧈 Manteiga')">🧈</div>
        </div>

        <!-- CENÁRIO 2: COZINHA -->
        <div id="kitchen-scene" class="scene">
            <!-- Avatares na Cozinha -->
            <img src="coisinho.png" id="coisinho-kitchen" class="avatar coisinho-img" style="bottom: 120px; left: 120px;" alt="Coisinho">
            <div id="my-avatar" class="avatar my-avatar" style="bottom: 120px; right: 120px; display: none;"></div>

            <div class="kitchen-table-area">
                <div class="bowl" id="bowl" onclick="mixCake()">
                    <div id="cake"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let itemsCollected = [];
        const totalItems = ['leite', 'trigo', 'ovo', 'manteiga'];
        let cakeMade = false;

        const msgBox = document.getElementById('msg-box');
        const achievementPopup = document.getElementById('achievement-popup');
        const achievementText = document.getElementById('achievement-text');

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('bakery-scene').style.display = 'block';
            updateMsg("Sua missão: Clique e roube os ingredientes para o bolo (Leite, Trigo, Ovo e Manteiga) e fuja pela SAÍDA!");
        }

        function updateMsg(text) {
            msgBox.innerHTML = text;
        }

        function showAchievement(text, callback) {
            achievementText.innerText = text;
            achievementPopup.classList.add('show');
            setTimeout(() => {
                achievementPopup.classList.remove('show');
                if(callback) callback();
            }, 4000);
        }

        function collectItem(id, name) {
            if (!itemsCollected.includes(id)) {
                itemsCollected.push(id);
                document.getElementById('item-' + id).style.display = 'none';
                
                const itemElem = document.getElementById('item-' + id);
                const coisinho = document.getElementById('coisinho-bakery');
                coisinho.style.left = (parseInt(itemElem.style.left) - 30) + 'px';

                if (itemsCollected.length === totalItems.length) {
                    updateMsg("Você pegou todos os ingredientes! Agora fuja pela SAÍDA!");
                } else {
                    updateMsg(`Você pegou o ${name}! Faltam ${totalItems.length - itemsCollected.length} ingrediente(s).`);
                }
            }
        }

        function tryExit() {
            if (itemsCollected.length < totalItems.length) {
                updateMsg("Você ainda não pegou todos os ingredientes! Não dá pra fazer o bolo assim!");
            } else {
                document.getElementById('coisinho-bakery').style.left = '580px';
                
                setTimeout(() => {
                    showAchievement("assaltante de padaria", () => {
                        goToKitchen();
                    });
                }, 500);
            }
        }

        function goToKitchen() {
            document.getElementById('bakery-scene').style.display = 'none';
            document.getElementById('kitchen-scene').style.display = 'block';
            updateMsg("Clique na bacia para misturar todos os ingredientes!");
        }

        function mixCake() {
            if (cakeMade) return;
            cakeMade = true;

            const bowl = document.getElementById('bowl');
            bowl.style.transform = 'rotate(10deg)';
            
            setTimeout(() => bowl.style.transform = 'rotate(-10deg)', 150);
            setTimeout(() => bowl.style.transform = 'rotate(0deg)', 300);

            setTimeout(() => {
                document.getElementById('cake').style.display = 'block';
                
                showAchievement("Bolo de leite ninho com maracuja...embora o de chocolate com maracuja seja melhor", () => {
                    finalBirthdayScene();
                });
            }, 600);
        }

        function finalBirthdayScene() {
            const myAvatar = document.getElementById('my-avatar');
            myAvatar.style.display = 'block';
            
            document.getElementById('coisinho-kitchen').style.left = '220px';
            myAvatar.style.right = '220px';

            updateMsg("🎉 🎶 Parabéns pra você, nesta data querida... 🎶 🎉<br><br><b>feliz aniversario Coisinho</b> ❤️");
        }
    </script>
</body>
</html>
