<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Game - Niver do Coisinho</title>
    <!-- Fonte no estilo Pixel Art -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Press Start 2P', monospace;
        }

        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Principal do Jogo */
        #game-container {
            width: 800px;
            height: 500px;
            position: relative;
            background-color: #000;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        /* Tela de Start (Azul Claro Pixel) */
        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #87CEEB;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border: 8px solid #4682B4;
        }

        #start-screen h1 {
            color: #1E3F66;
            font-size: 24px;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 3px 3px 0px #FFF;
            line-height: 1.5;
        }

        .btn-play {
            background-color: #005f73;
            color: #FFF;
            border: 4px solid #FFF;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s;
        }

        .btn-play:hover {
            background-color: #0a9396;
            transform: scale(1.05);
        }

        /* Cenários */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
        }

        /* Cenário 1: Padaria */
        #bakery-scene {
            background-color: #f4a261;
            /* Detalhes do chão da padaria */
            background-image: 
                linear-gradient(45deg, #e76f51 25%, transparent 25%), 
                linear-gradient(-45deg, #e76f51 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e76f51 75%),
                linear-gradient(-45deg, transparent 75%, #e76f51 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
        }

        /* Balcão e Porta da Padaria */
        .counter {
            position: absolute;
            bottom: 0;
            left: 200px;
            width: 400px;
            height: 80px;
            background-color: #8d5b4c;
            border: 4px solid #3d2314;
        }

        .exit-door {
            position: absolute;
            bottom: 0;
            right: 20px;
            width: 80px;
            height: 140px;
            background-color: #e63946;
            border: 4px solid #900c3f;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 10px;
            text-align: center;
        }

        /* Cenário 2: Cozinha */
        #kitchen-scene {
            background-color: #2a9d8f;
            background-image: radial-gradient(#264653 20%, transparent 20%);
            background-size: 30px 30px;
        }

        .kitchen-table {
            position: absolute;
            bottom: 40px;
            left: 250px;
            width: 300px;
            height: 120px;
            background-color: #e9c46a;
            border: 4px solid #f4a261;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bowl {
            width: 80px;
            height: 50px;
            background-color: #ffffff;
            border: 4px solid #d8d8d8;
            border-radius: 0 0 40px 40px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        /* Avatares */
        .avatar {
            width: 50px;
            height: 70px;
            position: absolute;
            transition: all 0.2s ease;
        }

        /* Avatar do Coisinho (Moletom Verde, Cabelo Castanho Cacheado com Branco) */
        .coisinho {
            background-color: #2d6a4f; /* Moletom verde musgo */
            border-radius: 8px;
            border: 3px solid #1b4332;
        }
        .coisinho::before {
            content: '';
            position: absolute;
            top: -18px;
            left: 2px;
            width: 40px;
            height: 22px;
            background-color: #582f0e; /* Cabelo Castanho */
            border-radius: 10px 10px 0 0;
            box-shadow: inset 10px 0 0 #e9ecef; /* Mecha Branca */
        }
        .coisinho::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 10px;
            width: 24px;
            height: 12px;
            background-color: #ffcdb2; /* Pele */
            border-radius: 3px;
        }

        /* Seu Avatar (Cabelo Cacheado Vermelho, Pele Morena Clara) */
        .my-avatar {
            background-color: #e63946; /* Roupa */
            border-radius: 8px;
            border: 3px solid #900c3f;
        }
        .my-avatar::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -4px;
            width: 52px;
            height: 25px;
            background-color: #d62828; /* Cabelo Vermelho */
            border-radius: 15px 15px 0 0;
        }
        .my-avatar::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 10px;
            width: 24px;
            height: 12px;
            background-color: #e0a96d; /* Pele Morena Clara */
            border-radius: 3px;
        }

        /* Itens para Coletar */
        .item {
            width: 30px;
            height: 30px;
            position: absolute;
            background-color: #FFF;
            border: 2px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        /* Interface, Caixas de Mensagem e Conquistas */
        #msg-box {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background-color: rgba(0, 0, 0, 0.85);
            color: #FFF;
            border: 3px solid #FFF;
            padding: 12px;
            font-size: 11px;
            line-height: 1.6;
            text-align: center;
            z-index: 50;
        }

        .achievement {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #f1c40f;
            color: #000;
            border: 4px solid #000;
            padding: 12px 20px;
            font-size: 10px;
            text-align: center;
            z-index: 60;
            transition: bottom 0.5s ease-in-out;
            box-shadow: 0 4px 0 #b7950b;
            max-width: 80%;
        }

        .achievement.show {
            bottom: 20px;
        }

        /* Bolo Prontinho */
        #cake {
            width: 60px;
            height: 45px;
            background-color: #fff; /* Leite Ninho */
            border: 3px solid #d4a373;
            border-radius: 8px 8px 0 0;
            position: absolute;
            top: -50px;
            display: none;
        }
        #cake::before {
            content: '';
            position: absolute;
            top: 0;
            width: 100%;
            height: 15px;
            background-color: #fcbf49; /* Calda de Maracujá */
            border-radius: 5px 5px 0 0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- TELA DE START -->
        <div id="start-screen">
            <h1>O ANIVERSÁRIO DO COISINHO</h1>
            <button class="btn-play" onclick="startGame()">PLAY</button>
        </div>

        <!-- CAIXA DE DIÁLOGO / MISSÃO -->
        <div id="msg-box">Carregando missão...</div>

        <!-- POPUP DE CONQUISTAS -->
        <div id="achievement-popup" class="achievement">
            🏆 <b>CONQUISTA DESBLOQUEADA:</b><br><span id="achievement-text"></span>
        </div>

        <!-- CENÁRIO 1: PADARIA -->
        <div id="bakery-scene" class="scene">
            <div class="counter"></div>
            <div class="exit-door" id="door" onclick="tryExit()">SAÍDA</div>
            
            <!-- Avatar do Coisinho na Padaria -->
            <div id="coisinho-bakery" class="avatar coisinho" style="bottom: 40px; left: 50px;"></div>

            <!-- Ingredientes espalhados -->
            <div class="item" id="item-leite" style="top: 150px; left: 220px;" onclick="collectItem('leite', '🥛 Leite')">🥛</div>
            <div class="item" id="item-trigo" style="top: 120px; left: 400px;" onclick="collectItem('trigo', '🌾 Trigo')">🌾</div>
            <div class="item" id="item-ovo" style="top: 220px; left: 310px;" onclick="collectItem('ovo', '🥚 Ovo')">🥚</div>
            <div class="item" id="item-manteiga" style="top: 180px; left: 520px;" onclick="collectItem('manteiga', '🧈 Manteiga')">🧈</div>
        </div>

        <!-- CENÁRIO 2: COZINHA -->
        <div id="kitchen-scene" class="scene">
            <div id="coisinho-kitchen" class="avatar coisinho" style="bottom: 150px; left: 160px;"></div>
            <div id="my-avatar" class="avatar my-avatar" style="bottom: 150px; right: 160px; display: none;"></div>

            <div class="kitchen-table">
                <div class="bowl" id="bowl" onclick="mixCake()">
                    <div id="cake"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Estado do Jogo
        let itemsCollected = [];
        const totalItems = ['leite', 'trigo', 'ovo', 'manteiga'];

        // Elementos da DOM
        const msgBox = document.getElementById('msg-box');
        const achievementPopup = document.getElementById('achievement-popup');
        const achievementText = document.getElementById('achievement-text');

        // Iniciar o Jogo
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('bakery-scene').style.display = 'block';
            updateMsg("Sua missão: Clique e roube os ingredientes para o bolo (Leite, Trigo, Ovo e Manteiga) e fuja pela SAÍDA!");
        }

        // Atualizar caixa de texto
        function updateMsg(text) {
            msgBox.innerHTML = text;
        }

        // Mostrar Conquistas
        function showAchievement(text, callback) {
            achievementText.innerText = text;
            achievementPopup.classList.add('show');
            setTimeout(() => {
                achievementPopup.classList.remove('show');
                if(callback) callback();
            }, 4000);
        }

        // Coletar Itens na Padaria
        function collectItem(id, name) {
            if (!itemsCollected.includes(id)) {
                itemsCollected.push(id);
                document.getElementById('item-' + id).style.display = 'none';
                
                // Mover o Coisinho até o item
                const itemElem = document.getElementById('item-' + id);
                const coisinho = document.getElementById('coisinho-bakery');
                coisinho.style.left = itemElem.style.left;

                if (itemsCollected.length === totalItems.length) {
                    updateMsg("Você pegou todos os ingredientes! Agora vá para a SAÍDA!");
                } else {
                    updateMsg(`Você pegou o ${name}! Faltam ${totalItems.length - itemsCollected.length} ingrediente(s).`);
                }
            }
        }

        // Tentar Sair da Padaria
        function tryExit() {
            if (itemsCollected.length < totalItems.length) {
                updateMsg("Você ainda não pegou todos os ingredientes! A padaria não pode ser roubada pela metade!");
            } else {
                // Mover para a porta
                document.getElementById('coisinho-bakery').style.left = '700px';
                
                setTimeout(() => {
                    showAchievement("Assaltante de padaria", () => {
                        goToKitchen();
                    });
                }, 500);
            }
        }

        // Mudar para a Cozinha
        function goToKitchen() {
            document.getElementById('bakery-scene').style.display = 'none';
            document.getElementById('kitchen-scene').style.display = 'block';
            updateMsg("Clique na bacia para misturar todos os ingredientes e fazer o bolo!");
        }

        // Misturar Bolo na Cozinha
        let cakeMade = false;
        function mixCake() {
            if (cakeMade) return;
            cakeMade = true;

            const bowl = document.getElementById('bowl');
            bowl.style.transform = 'rotate(10deg)';
            
            setTimeout(() => bowl.style.transform = 'rotate(-10deg)', 150);
            setTimeout(() => bowl.style.transform = 'rotate(0deg)', 300);

            setTimeout(() => {
                document.getElementById('cake').style.display = 'block';
                
                showAchievement("Bolo de leite ninho com maracujá... embora o de chocolate com maracujá seja melhor", () => {
                    finalBirthdayScene();
                });
            }, 600);
        }

        // Cena Final de Parabéns
        function finalBirthdayScene() {
            // Mostrar seu avatar
            const myAvatar = document.getElementById('my-avatar');
            myAvatar.style.display = 'block';
            
            // Aproximar os avatares da mesa
            document.getElementById('coisinho-kitchen').style.left = '200px';
            myAvatar.style.right = '200px';

            updateMsg("🎉 🎶 Parabéns pra você, nesta data querida... 🎶 🎉<br><br><b>FELIZ ANIVERSÁRIO, COISINHO! ❤️</b>");
        }
    </script>
</body>
</html>
<script src="script.js"></script>
<link rel="stylesheet" href="style.css">
